<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stand Evaluation</title><style>
:root{--s:#9bbc0f;--l:#8bac0f;--m:#306230;--i:#0f380f;--c:#c8c8bd;--b:#8a174f}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#14161b;font-family:"Courier New",monospace;padding:10px}.gb{width:min(430px,96vw);background:var(--c);padding:24px 20px;border-radius:18px 18px 60px 18px;box-shadow:0 18px 50px #0009,inset 4px 4px #fff6,inset -4px -4px #74766f66}.frame{background:#565966;padding:18px 18px 24px;border-radius:12px 12px 36px 12px}.label{color:#d1d2d8;font:700 9px Arial;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}.screen{min-height:430px;background:var(--s);color:var(--i);border:4px solid #23261f;box-shadow:inset 0 0 0 4px #77920c,inset 0 0 28px #46600066;padding:14px;display:flex;flex-direction:column;position:relative;overflow:hidden}.screen:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,#0f380f12 4px);pointer-events:none}.hud,.hint,.page{position:relative;z-index:1}.hud{display:flex;justify-content:space-between;border-bottom:2px solid var(--i);padding-bottom:7px;font-size:11px;font-weight:700}.page{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:auto;padding:8px 0}.hint{border-top:2px solid var(--i);padding-top:7px;text-align:center;color:var(--m);font-size:10px}.eyebrow{font-size:11px;color:var(--m);font-weight:700;text-transform:uppercase;margin:0 0 8px}h1{font-size:40px;line-height:.95;margin:0 0 12px;text-transform:uppercase;text-shadow:3px 3px var(--l)}h2{font-size:17px;line-height:1.2;margin:0 0 12px;text-transform:uppercase}.small{font-size:11px;line-height:1.35;color:var(--m)}.menu{display:grid;gap:7px}.choice{border:0;background:transparent;color:var(--i);text-align:left;font-weight:700;padding:7px 8px 7px 22px;cursor:pointer;position:relative}.choice.sel{outline:2px solid var(--i);background:#8bac0f80}.choice.sel:before{content:"▶";position:absolute;left:6px}.name{font-size:32px;font-weight:700;line-height:.95;text-transform:uppercase;margin-bottom:8px}.media{display:grid;grid-template-columns:100px 1fr;gap:10px;margin-top:10px}.media img{width:100px;height:100px;object-fit:contain;border:2px solid var(--i);background:var(--l)}.desc{font-size:10px;line-height:1.3;margin:0;max-height:150px;overflow:auto}.stats{display:grid;grid-template-columns:repeat(3,1fr);font-size:11px;font-weight:700;gap:4px 8px;margin:10px 0}.link{display:inline-block;border:2px solid var(--i);background:var(--l);color:var(--i);padding:7px 9px;text-decoration:none;font-weight:700;text-transform:uppercase}.brand{font:italic 900 18px Arial;color:#313343;margin:14px 0 4px}.controls{display:flex;justify-content:space-between;align-items:center;min-height:140px;padding:8px 12px 0}.dpad{width:112px;height:112px;position:relative}.dpad button{position:absolute;width:38px;height:38px;border:0;background:#25272a;color:#888;box-shadow:inset 2px 2px #4d4f53,inset -3px -3px #101113}.u{left:37px}.d{left:37px;bottom:0}.l{left:0;top:37px}.r{right:0;top:37px}.dpad:after{content:"";position:absolute;left:37px;top:37px;width:38px;height:38px;background:#25272a}.ab{display:flex;gap:14px;transform:rotate(-18deg)}.ab button{width:56px;height:56px;border:0;border-radius:50%;background:var(--b);color:#e7abc8;font-weight:900;box-shadow:inset 3px 3px #b8467a,inset -4px -4px #52102f,0 5px #85877f}.sys{display:flex;justify-content:center;gap:20px;transform:rotate(-18deg);margin-top:-10px}.sys button{width:62px;height:14px;border:0;border-radius:99px;background:#777971;color:#4e504b;font-size:8px;font-weight:700;line-height:30px}.site-links{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin:28px 6px 0;font:700 10px/1.3 Arial,sans-serif;text-transform:uppercase}.site-links a{color:#303a8f;text-decoration:none;border-bottom:1px solid currentColor}.site-links a:hover{color:#8a174f}@media(max-width:420px){.gb{padding:18px 14px}.frame{padding:14px}.screen{min-height:410px}}
</style></head><body><main class="gb"><section class="frame"><div class="label">Dot matrix with stereo sound</div><div class="screen"><div class="hud"><span>STAND EVAL</span><span id="status">READY</span></div><div class="page" id="page"></div><div class="hint" id="hint">ARROWS: MOVE · Z/ENTER: SELECT</div></div></section><div class="brand">STAND PERSONALITY SYSTEM</div><section class="controls"><div class="dpad"><button class="u" data-move="-1">▲</button><button class="l" data-move="-1">◀</button><button class="r" data-move="1">▶</button><button class="d" data-move="1">▼</button></div><div class="ab"><button id="b">B</button><button id="a">A</button></div></section><div class="sys"><button id="reset">SELECT</button><button id="start">START</button></div><nav class="site-links" aria-label="Project links"><a href="https://github.com/mncrftfrcnm/7th_jojo_personality_test_site" target="_blank" rel="noreferrer">Project</a><a href="https://7thjojo.fandom.com/wiki/FAQ#Download_links" target="_blank" rel="noreferrer">Download game</a></nav></main><script>
const q=(t,n,y,yk=0,nk=0)=>({t,a:{No:{t:n,k:nk},Yes:{t:y,k:yk}}});
const data={open:[{q:"Imagine yourself with friends. Where are you standing?",o:["Mingling with the group","Right in the centre","Off in my own place"]},{q:"How much trust do you place in new people?",o:["I trust them from the outset","I make them earn my trust","Depends on the situation"]}],route:{"I trust them from the outset":{"Mingling with the group":"F","Right in the centre":"B","Off in my own place":"A"},"I make them earn my trust":{"Mingling with the group":"C","Right in the centre":"H","Off in my own place":"G"},"Depends on the situation":{"Mingling with the group":"I","Right in the centre":"E","Off in my own place":"D"}},traits:{
A:{n:"Serious",q:[q("Your boyfriend or girlfriend left their phone at your house. Do you check their messages?","I","B"),q("At a party, someone is drinking alone by the window. They seem lonely. Do you make conversation?","I","B"),q("You are working on something important, but your friend is swamped with assignments. Do you put your project aside to help?","I","B"),q("Do you think all the world's problems will be solved if people simply learn to cooperate?","I","B")]},
B:{n:"Cooperative",q:[q("Do you have trouble with social obligations?","A","C"),q("When your family members get sloppy, do you chastise them?","C","A"),q("Do you prefer giving keepsakes rather than practical gifts?","C","A"),q("Do you put a high value on your individuality?","C","A")]},
C:{n:"Proud",q:[q("Do you go out of your way to attend to other people's needs?","D","B"),q("When something good happens, do you suspect there is a catch?","B","D"),q("Do you talk to yourself frequently?","B","D"),q("Are you a good liar?","D","B")]},
D:{n:"Anxious",q:[q("Can you change your stance when someone gives a persuasive counterargument?","C","E"),q("When you are troubled, do you like to talk it out with others?","E","C"),q("Are you fussy about how other people view you?","E","C"),q("Do you readily take positions of leadership?","E","C")]},
E:{n:"Cold",q:[q("Do you like being the only person in a room?","F","D"),q("Do you think there is no one who truly understands you?","F","D"),q("Do you dislike inviting friends over?","F","D"),q("Do you have a hard time saying no?","F","D")]},
F:{n:"Cautious",q:[q("Are you a quiet person?","G","E"),q("When something exciting is going on, do you immediately want to join the fun?","E","G"),q("Are you uninterested in gambling?","G","E"),q("Do you think life is short, so enjoying yourself is most important?","G","E")]},
G:{n:"Cheerful",q:[q("Are you often quick to throw in the towel?","H","F"),q("Do you think people are fundamentally evil by nature?","F","H",1),q("Are there people you trust so much that you feel completely at ease with them?","H","F"),q("Do you aspire to become rich?","H","F")]},
H:{n:"Ambitious",q:[q("Do you often worry about standing out?","G","I"),q("On your days off, do you prefer going out to relaxing at home?","I","G"),q("Do you find yourself thinking that women are scary?","I","G"),q("Are you bad at keeping still?","I","G")]},
I:{n:"Calm",q:[q("Do you think the ends justify the means?","A","H"),q("Do you believe in survival of the fittest?","A","H",1),q("Do you think two against one is unfair?","H","A",0,1),q("Do you think putting high hopes in others will only lead to disappointment?","A","H")]}
},stands:{"A:B":["Quicksilver","Quicksilver"],"A:I":["Napalm Death","Napalm_Death"],"B:A":["Sonic Youth","Sonic_Youth"],"B:C":["Pixies","Pixies"],"C:B":["Mr. Big","Mr._Big"],"C:D":["Specials","Specials"],"D:C":["Wildhearts","Wildhearts"],"D:E":["Miracles","Miracles"],"E:D":["Cardigans","Cardigans"],"E:F":["Howlin' Wolf","Howlin%27_Wolf"],"F:E":["Pharoah Sanders","Pharoah_Sanders"],"F:G":["The Joykiller","The_Joykiller"],"G:F":["Caravan","Caravan"],"G:H":["Ocean Blue","Ocean_Blue"],"H:G":["Carpenters","Carpenters"],"H:I":["Red Garland","Red_Garland"],"I:H":["Deep Purple","Deep_Purple"],"I:A":["Adam Ant","Adam_Ant"]}};
const page=document.querySelector('#page'),status=document.querySelector('#status'),hint=document.querySelector('#hint');let mode='title',cursor=0,step=0,answers=[],scores={},karma=0,trait='',question=null,count=0,sound=true;const blank=()=>Object.fromEntries([..."ABCDEFGHI"].map(x=>[x,0]));scores=blank();
function reset(){mode='title';cursor=0;step=0;answers=[];scores=blank();karma=0;trait='';question=null;count=0;render()}function start(){mode='open';cursor=0;step=0;answers=[];scores=blank();karma=0;count=0;beep(520,.06);render()}
function choose(){if(mode==='title')return start();if(mode==='open'){let item=data.open[step];answers.push(item.o[cursor]);if(step===0){step=1;cursor=0;return render()}trait=data.route[answers[1]][answers[0]];let n=Math.floor(Math.random()*3)+1;scores[trait]=n;question=data.traits[trait].q[n-1];mode='q';cursor=0;return render()}if(mode==='q'){let pick=cursor===0?'Yes':'No',r=question.a[pick];karma+=r.k;scores[r.t]++;trait=r.t;count++;if(scores[trait]>=5)return result(trait);question=data.traits[trait].q[scores[trait]-1];cursor=0;beep(r.k?880:660,.05);render()}else if(mode==='result')start()}
function sub(main){let n={A:['B','I'],B:['A','C'],C:['B','D'],D:['C','E'],E:['D','F'],F:['E','G'],G:['F','H'],H:['G','I'],I:['H','A']}[main],[l,r]=n;if(scores[l]>scores[r])return l;if(scores[r]>scores[l])return r;if(main==='I')return'A';if(main==='A')return'I';return String.fromCharCode(main.charCodeAt(0)+1)}
async function result(main){mode='result';let st=sub(main),[name,slug]=data.stands[main+':'+st],url='https://7thjojo.fandom.com/wiki/'+slug;status.textContent='COMPLETE';hint.textContent='A/START: RETAKE';page.innerHTML=`<div><p class="eyebrow">Evaluation complete</p><h2>Your Stand is</h2><div class="name">${name}</div><p class="small">${main} · ${data.traits[main].n}<br>Sub-trait ${st} · Karma ${karma}</p><div class="stats">${Object.entries(scores).map(([k,v])=>`<span>${k}:${v}</span>`).join('')}</div><div class="media"><img id="img" alt="${name}" hidden><p class="desc" id="desc">Loading Stand data...</p></div><a class="link" href="${url}" target="_blank">Open Stand Page</a></div>`;beep(440,.08);setTimeout(()=>beep(660,.08),90);setTimeout(()=>beep(880,.14),180);load(slug,name)}
async function load(slug,name){let title=decodeURIComponent(slug.replaceAll('_',' ')),p=new URLSearchParams({action:'query',prop:'extracts|pageimages',exintro:'1',explaintext:'1',piprop:'original|thumbnail',pithumbsize:'400',redirects:'1',titles:title,format:'json',origin:'*'});try{let r=await fetch('https://7thjojo.fandom.com/api.php?'+p),j=await r.json(),x=Object.values(j.query.pages)[0],d=x.extract||'No description available.',u=x.original?.source||x.thumbnail?.source||'';document.querySelector('#desc').textContent=d;if(u){let i=document.querySelector('#img');i.src=u;i.hidden=false}}catch(e){document.querySelector('#desc').textContent=name+'. Open the Stand page for full details.'}}
function move(n){let c=mode==='open'?data.open[step].o.length:mode==='q'?2:1;if(c<2)return;cursor=(cursor+n+c)%c;beep(330,.02);render()}function btn(t,i){return `<button class="choice${i===cursor?' sel':''}" data-choice="${i}">${t}</button>`}function wire(){document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{cursor=+b.dataset.choice;choose()})}
function render(){if(mode==='title'){status.textContent='READY';hint.textContent='PRESS START · ENTER · Z';page.innerHTML=`<div><p class="eyebrow">7th Stand User</p><h1>Stand<br>Evaluation</h1><p class="small">Answer honestly. One personality trait will reach level 5 and reveal your Stand.</p>${btn('START',0)}</div>`;return wire()}if(mode==='open'){let x=data.open[step];status.textContent=`INTRO ${step+1}/2`;page.innerHTML=`<div><p class="eyebrow">Opening question ${step+1}</p><h2>${x.q}</h2><div class="menu">${x.o.map(btn).join('')}</div></div>`;return wire()}if(mode==='q'){status.textContent=`${trait}:${scores[trait]}/5 K:${karma}`;page.innerHTML=`<div><p class="eyebrow">${trait} · ${data.traits[trait].n} · Level ${scores[trait]}</p><h2>${question.t}</h2><div class="menu">${btn('YES',0)}${btn('NO',1)}</div></div>`;wire()}}
function beep(f,d){if(!sound)return;let A=window.AudioContext||window.webkitAudioContext;if(!A)return;let a=beep.a||(beep.a=new A),o=a.createOscillator(),g=a.createGain(),n=a.currentTime;o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.035,n);g.gain.exponentialRampToValueAtTime(.0001,n+d);o.connect(g);g.connect(a.destination);o.start(n);o.stop(n+d)}
document.onkeydown=e=>{let k=e.key.toLowerCase();if(['arrowup','arrowleft'].includes(k)){e.preventDefault();move(-1)}if(['arrowdown','arrowright'].includes(k)){e.preventDefault();move(1)}if(['enter',' ','z'].includes(k)){e.preventDefault();choose()}if(k==='x'||k==='m')sound=!sound;if(k==='r')reset()};document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>move(+b.dataset.move));document.querySelector('#a').onclick=choose;document.querySelector('#b').onclick=()=>sound=!sound;document.querySelector('#start').onclick=choose;document.querySelector('#reset').onclick=reset;render();
</script></body></html>
